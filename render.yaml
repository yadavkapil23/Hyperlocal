services:
  - type: web
    name: hyperlocal-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hyperlocal-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
    healthCheckPath: /health

  - type: web
    name: hyperlocal-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile.prod
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: hyperlocal-backend
          property: host

databases:
  - name: hyperlocal-db
    databaseName: hyperlocal
    user: hyperlocal
    plan: free
